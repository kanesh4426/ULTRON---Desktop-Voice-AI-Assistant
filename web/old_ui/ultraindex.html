<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.L.T.R.O.N Interface</title>
    
    <!-- ADD EEL SCRIPT -->
    <script type="text/javascript" src="/eel.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background: rgba(15, 32, 39, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            transition: transform 0.3s ease-in-out, width 0.3s ease-in-out, padding 0.3s ease-in-out;
            overflow-y: auto;
            z-index: 100;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .sidebar.hidden {
            width: 0;
            transform: translateX(-100%);
            padding-left: 0;
            padding-right: 0;
            border-right: none;
            overflow: hidden;
        }
        
        .sidebar-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .ultron-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 198, 255, 0.5);
        }
        
        .ultron-icon i {
            font-size: 20px;
        }
        
        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .search-container {
            position: relative;
            margin-bottom: 20px;
        }
        
        .search-container input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
        }
        
        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
        }
        
        .chat-list {
            list-style: none;
            flex: 1;
            overflow-y: auto;
        }
        
        .chat-item {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .chat-item.active {
            background: rgba(0, 198, 255, 0.2);
            border-left: 3px solid #00c6ff;
        }
        
        .chat-info {
            flex: 1;
        }
        
        .chat-name {
            font-weight: 500;
            margin-bottom: 5px;
        }
        
        .chat-date {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .chat-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .chat-item:hover .chat-actions {
            opacity: 1;
        }
        
        .chat-action-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 12px;
            padding: 4px;
            border-radius: 4px;
            transition: color 0.2s, background 0.2s;
        }
        
        .chat-action-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 198, 255, 0.4);
        }
        
        /* Main Chat Area */
        .main-content {
            flex-grow: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
            transition: margin-left 0.3s ease-in-out;
            overflow: hidden;
        }
        
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px; 
            padding-top: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff88;
        }
        
        .chat-title {
            font-size: 22px;
            font-weight: 600;
        }
        
        /* 3-Dots Menu Styles */
        .menu-container {
            position: relative;
        }
        
        .menu-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: all 0.3s ease;
            font-size: 18px;
        }
        
        .menu-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        
        .dropdown-menu {
            position: absolute;
            top: 50px;
            right: 0;
            background: rgba(15, 32, 39, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 8px;
            min-width: 200px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            animation: slideDown 0.2s ease;
        }
        
        .dropdown-menu.show {
            display: block;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: none;
            border: none;
            color: white;
            width: 100%;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        
        .menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(2px);
        }
        
        .menu-item i {
            width: 20px;
            text-align: center;
            font-size: 16px;
        }
        
        .menu-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 6px 0;
        }
        
        /* Enhanced message types */
        .code-message .message-bubble {
            background: rgba(30, 30, 30, 0.9) !important;
            border-left: 4px solid #007acc;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }
        
        .content-message .message-bubble {
            background: rgba(248, 249, 250, 0.1) !important;
            border-left: 4px solid #28a745;
        }
        
        .technical-message .message-bubble {
            background: rgba(255, 243, 205, 0.1) !important;
            border-left: 4px solid #ffc107;
        }
        
        .system-message .message-bubble {
            background: rgba(108, 117, 125, 0.1) !important;
            border-left: 4px solid #6c757d;
            font-style: italic;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.8em;
            opacity: 0.8;
        }
        
        .content-type-badge {
            background: #6c757d;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7em;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .code-message .content-type-badge {
            background: #007acc;
        }
        
        .content-message .content-type-badge {
            background: #28a745;
        }
        
        .technical-message .content-type-badge {
            background: #ffc107;
            color: #212529;
        }
        
        .system-message .content-type-badge {
            background: #6c757d;
        }
        
        .code-content pre {
            margin: 10px 0;
            padding: 15px;
            overflow-x: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-size: 0.9em;
            line-height: 1.4;
        }
        
        .code-content code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .inline-code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            color: #00c6ff;
            font-size: 0.85em;
        }

        /* Rating system */
        .message-rating {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
            gap: 4px;
        }
        
        .rating-star {
            background: none;
            border: none;
            font-size: 1.2em;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.2s ease;
        }
        
        .rating-star:hover {
            opacity: 1;
            transform: scale(1.2);
        }
        
        .rating-star.active {
            opacity: 1;
            color: #ffc107;
        }

        /* Connection status styles */
        .connection-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8em;
            font-weight: 500;
            z-index: 10000;
            max-width: 300px;
            text-align: center;
            display: none;
        }
        
        .connection-status.status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .connection-status.status-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .connection-status.status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Voice button listening state */
        .action-button.listening {
            color: #00c6ff;
            background: rgba(0, 198, 255, 0.2);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 198, 255, 0.4);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(0, 198, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0, 198, 255, 0);
            }
        }

        /* Attachment menu styles */
        .attachment-menu {
            position: absolute;
            bottom: 70px;
            left: 20px;
            background: rgba(15, 32, 39, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            padding: 8px;
            z-index: 1000;
            min-width: 180px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            visibility: hidden;
        }
        
        .attachment-menu.show {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }
        
        .attachment-option {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .attachment-option:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(2px);
        }
        
        .attachment-icon {
            margin-right: 10px;
            font-size: 1.1em;
            width: 20px;
            text-align: center;
        }
        
        .chat-window {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }
        
        .messages-container {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        
        .message {
            margin-bottom: 20px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            margin-left: auto;
        }
        
        .message-bubble {
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.4;
        }
        
        .user-message .message-bubble {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-bottom-right-radius: 5px;
        }
        
        .assistant-message .message-bubble {
            background: rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 5px;
        }
        
        .message-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            text-align: right;
        }
        
        .assistant-message .message-time {
            text-align: left;
        }
        
        .welcome-message {
            text-align: center;
            margin-top: 60px;
        }
        
        .welcome-message h2 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .welcome-message p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }
        
        .input-container {
            flex-shrink: 0;
            display: flex;
            gap: 10px;
            position: relative;
        }
        
        .input-container input {
            flex: 1;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 16px;
        }
        
        .input-actions {
            display: flex;
            gap: 10px;
        }
        
        .action-button {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: background 0.2s;
        }
        
        .action-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .send-button {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 198, 255, 0.5);
            transition: transform 0.2s;
        }
        
        .send-button:hover {
            transform: scale(1.05);
        }
        
        .toggle-sidebar {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 10px rgba(0, 198, 255, 0.5);
        }

        /* Overlay for modals */
        .modal {
            position: fixed; /* Crucial */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e3c72; /* Solid background for the modal */
            padding: 30px;
            border-radius: 10px;
            z-index: 10000; /* MUST be HIGHER than the overlay (9999) */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            display: none;
            opacity: 0;
            /* Important: If the modal is still blurred, try adding filter: none; */
            filter: none; 
            transition: opacity 0.3s ease;
            
}
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000 !important;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(3px);
        }
        
        .modal-overlay.show {
            display: block;
            opacity: 1;
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .sidebar {
                width: 280px;
                position: fixed;
                height: 100%;
                z-index: 1000;
            }
            
            .message {
                max-width: 90%;
            }

            .attachment-menu {
                position: fixed;
                bottom: 70px;
                left: 10px;
                right: auto;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="toggle-sidebar" id="toggleSidebar">
        <i class="fas fa-robot"></i>
    </div>
    
    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay"></div>
    
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="ultron-icon" id="ultronIcon">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="sidebar-title">Chat Sections</div>
            </div>
            
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search chats...">
            </div>
            
            <ul class="chat-list" id="chatList">
                <!-- Chat items will be populated by JavaScript -->
            </ul>
            
            <div class="sidebar-footer">
                <button class="new-chat-btn" id="newChatBtn">
                    <i class="fas fa-plus"></i> New Chat
                </button>
            </div>
        </div>
        
        <div class="main-content">
            <div class="chat-header">
                <div class="header-left">
                    <div class="status-indicator"></div>
                    <div class="chat-title" id="currentChatTitle">U.L.T.R.O.N</div>
                </div>
                
                <!-- Simplified 3-Dots Menu -->
                <div class="menu-container">
                    <button class="menu-btn" id="menuBtn">
                        <i class="fas fa-ellipsis-v"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <button class="menu-item" id="menuClearChat">
                            <i class="fas fa-trash"></i>
                            Clear Chat
                        </button>
                        <button class="menu-item" id="menuExportChat">
                            <i class="fas fa-download"></i>
                            Export Chat
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="chat-window">
                <div class="messages-container" id="messagesContainer">
                    <!-- Messages will be populated by JavaScript -->
                </div>
            </div>
            
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Type a message...">
                <div class="input-actions">
                    <button class="action-button" id="voiceInputBtn" title="Voice Input">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button class="action-button" id="attachFileBtn" title="Attach File">
                        <i class="fas fa-paperclip"></i>
                    </button>
                </div>
                <button class="send-button" id="sendMessageBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
    
    <!-- USE YOUR SCRIPT -->
    <script src="script.js"></script>
</body>
</html>
